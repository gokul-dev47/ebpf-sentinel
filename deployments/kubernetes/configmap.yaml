apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinel-config
  namespace: sentinel-system
  labels:
    app: ebpf-sentinel
data:
  scan_interval: "300"
  prometheus_enabled: "true"
  prometheus_addr: ":9090"
  api_addr: ":8080"
  log_level: "info"
  log_format: "json"
  latency_anomaly_threshold: "3"
  baseline_min_samples: "100"
  process_enum_method: "auto"
  enabled_checks: "all"
  alert_dedup_window: "3600"
---
apiVersion: v1
kind: Namespace
metadata:
  name: sentinel-system
  labels:
    app: ebpf-sentinel
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ebpf-sentinel
  namespace: sentinel-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ebpf-sentinel
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "namespaces"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ebpf-sentinel
subjects:
  - kind: ServiceAccount
    name: ebpf-sentinel
    namespace: sentinel-system
roleRef:
  kind: ClusterRole
  name: ebpf-sentinel
  apiGroup: rbac.authorization.k8s.io
