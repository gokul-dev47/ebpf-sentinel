apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ebpf-sentinel
  namespace: sentinel-system
  labels:
    app: ebpf-sentinel
spec:
  selector:
    matchLabels:
      app: ebpf-sentinel
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: ebpf-sentinel
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: ebpf-sentinel
      tolerations:
        - operator: Exists
      priorityClassName: system-node-critical
      initContainers:
        - name: check-btf
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              test -f /sys/kernel/btf/vmlinux && echo "BTF available" || \
              (echo "ERROR: BTF not available" && exit 1)
          volumeMounts:
            - name: btf
              mountPath: /sys/kernel/btf
              readOnly: true
      containers:
        - name: sentinel
          image: ghcr.io/gokul-dev47/ebpf-sentinel:latest
          imagePullPolicy: Always
          args:
            - --scan-interval=5m
            - --api-addr=:8080
            - --metrics-addr=:9090
            - --log-level=info
            - --log-format=json
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: SENTINEL_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: db-dsn
                  optional: true
            - name: SENTINEL_REDIS_DSN
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: redis-dsn
                  optional: true
            - name: SENTINEL_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: webhook-url
                  optional: true
          ports:
            - name: api
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_PTRACE
                - NET_ADMIN
                - BPF
                - PERFMON
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: btf
              mountPath: /sys/kernel/btf
              readOnly: true
            - name: proc
              mountPath: /proc
              readOnly: true
            - name: bpf-fs
              mountPath: /sys/fs/bpf
            - name: sys-module
              mountPath: /sys/module
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: btf
          hostPath:
            path: /sys/kernel/btf
        - name: proc
          hostPath:
            path: /proc
        - name: bpf-fs
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: sys-module
          hostPath:
            path: /sys/module
